  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    var photoOverrides = {
      'timeline-ms-lightsabers': 'assets/images/lightsabers.png',
      'timeline-college-arduino': 'assets/images/arduino.png',
      'timeline-eagle-project': 'assets/images/eagle-project.png',
      'timeline-hs-ski': 'assets/images/hs-ski.png',
      'timeline-ms-computers': 'assets/images/computers.png',
      'timeline-ms-rc': 'assets/images/rc.png',
      'timeline-scouts': 'assets/images/scouts.png',
      'timeline-hs-cyber': 'assets/images/cyber.png',
      'timeline-hs-3dprint': 'assets/images/hs-3dprint.png',
      'timeline-hs-turo': 'assets/images/hs-turo.png',
      'timeline-hs-classes': 'assets/images/hs-classes.png',
      'timeline-hs-derby': 'assets/images/derby.png',
      'timeline-seabase': 'assets/images/seabase.png',
      'timeline-philmont': 'assets/images/philmont.png'
    };
    Object.keys(photoOverrides).forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.setAttribute('src', photoOverrides[id]);
    });
    document.querySelectorAll('image-slot').forEach(function(el) {
      var s = el.getAttribute('src') || '';
      if (!s || s.indexOf('uploads/') === 0) {
        el.style.display = 'none';
      }
    });
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

om { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }\n@keyframes ping { 0% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; } 100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; } }\n<\u002Fstyle>\n<script src=\"a24c7f9b-c91a-4b8e-be5b-e9a83f0d0601\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div style=\"width:100%;min-height:100vh;background:#ffffff;position:relative;font-family:'Inter',sans-serif;color:#0a0a0a;box-sizing:border-box;\">\n\n  <div style=\"position:sticky;top:0;z-index:10;background:#ffffff;padding:clamp(16px,3vh,28px) clamp(20px,4vw,56px);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0a0a0a;\">\n    <a href=\"hero.html\" style=\"display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;color:#0a0a0a;text-transform:uppercase;text-decoration:none;cursor:pointer;\">\n      <span style=\"width:8px;height:8px;background:#0a0a0a;display:inline-block;\"><\u002Fspan>\n      RK / Mechanical Engineer\n    <\u002Fa>\n    <div style=\"display:flex;gap:clamp(20px,3vw,44px);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;\">\n      <a href=\"work.html\" style=\"color:#0a0a0a;text-decoration:none;\">Work<\u002Fa>\n      <span style=\"color:#e2231a;cursor:pointer;\">About<\u002Fspan>\n      <a href=\"contact.html\" style=\"color:#0a0a0a;text-decoration:none;\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"height:calc(100vh - 61px);min-height:520px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:clamp(24px,5vh,64px) clamp(20px,4vw,56px);border-bottom:1px solid #0a0a0a;box-sizing:border-box;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:3px;color:#e2231a;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeIn 0.6s ease 0.1s forwards;\">Philosophy<\u002Fdiv>\n    <div style=\"font-family:'Inter',sans-serif;font-weight:900;font-size:clamp(34px,6.5vw,86px);letter-spacing:-2px;line-height:1.12;max-width:1300px;\">\n      <sc-for list=\"{{ quoteWords }}\" as=\"w\" hint-placeholder-count=\"8\">\n        <span style=\"display:inline-block;opacity:0;animation:wordUp 0.7s cubic-bezier(0.2,0.7,0.2,1) {{ w.delay }}s forwards;\">{{ w.text }}&nbsp;<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;color:#8a8a8a;text-transform:uppercase;margin-top:28px;opacity:0;animation:fadeIn 0.8s ease 1.6s forwards;\">— Henry Petroski<\u002Fdiv>\n    <div style=\"margin-top:clamp(32px,6vh,64px);display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#8a8a8a;text-transform:uppercase;opacity:0;animation:fadeIn 0.8s ease 2s forwards;\">\n      Scroll <span style=\"animation:bob 1.6s ease-in-out infinite;\">↓<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:clamp(48px,8vh,80px) clamp(20px,4vw,56px);display:flex;gap:clamp(32px,6vw,80px);flex-wrap:wrap-reverse;align-items:flex-start;border-bottom:1px solid #0a0a0a;\">\n    <div style=\"flex:2 1 480px;display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:#8a8a8a;text-transform:uppercase;\">About<\u002Fdiv>\n      <div style=\"font-family:'Inter',sans-serif;font-size:clamp(18px,1.8vw,22px);font-weight:600;color:#0a0a0a;line-height:1.5;max-width:680px;\">\n        I'm Ryan Krueger, a mechanical engineer who likes turning ideas into hardware that actually works.\n      <\u002Fdiv>\n      <div style=\"font-family:'Inter',sans-serif;font-size:clamp(15px,1.4vw,17px);font-weight:500;color:#4a4a4a;line-height:1.7;max-width:680px;\">\n        I'm completing a B.S. in Mechanical Engineering at York College of Pennsylvania, with experience ranging from weaponized drone systems at Survice Engineering to load bank diagnostics at Redwolf Engineering, plus personal builds like a manual swap on a 1986 Nissan 300ZX and a Turo rental business. Building and creating has always driven me — from working on cars with my dad to drone photography, 3D printing, and designing websites and UX that make sense.\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <image-slot id=\"about-portrait\" src=\"e455c99b-80f0-42ec-a764-4b3fa7ac8904\" style=\"width:clamp(200px,26vw,280px);height:clamp(200px,26vw,280px);flex-shrink:0;\" shape=\"rect\" placeholder=\"Drop a photo of you\"><\u002Fimage-slot>\n  <\u002Fdiv>\n\n  <div style=\"border-bottom:1px solid #0a0a0a;padding:clamp(48px,8vh,72px) clamp(20px,4vw,56px) clamp(24px,4vh,40px);\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:#8a8a8a;text-transform:uppercase;margin-bottom:8px;\">How I Got Here<\u002Fdiv>\n    <div style=\"font-family:'Inter',sans-serif;font-weight:800;font-size:clamp(24px,3vw,36px);letter-spacing:-1px;\">A timeline, mostly involving power tools<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div ref=\"{{ setTimelineRef }}\" style=\"position:relative;border-bottom:1px solid #0a0a0a;height:{{ wrapperHeight }};\">\n    <div style=\"position:sticky;top:0;height:100vh;overflow:hidden;\">\n      <div style=\"position:absolute;top:0;left:0;right:0;height:4px;background:#eaeaea;z-index:3;\">\n        <div style=\"{{ headerFillStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"{{ waveWrapStyle }}\">\n        <svg style=\"position:absolute;inset:0;width:100%;height:100%;\" viewBox=\"{{ waveViewBox }}\" preserveAspectRatio=\"none\">\n          <path ref=\"{{ setWavePathRef }}\" d=\"{{ wavePath }}\" fill=\"none\" stroke=\"#e2231a\" stroke-width=\"0.45\" opacity=\"0.55\" pathLength=\"100\" style=\"{{ waveDashStyle }}\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"{{ waveDotWrapStyle }}\">\n        <div style=\"{{ waveDotStyle }}\"><\u002Fdiv>\n        <sc-for list=\"{{ particles }}\" as=\"p\" hint-placeholder-count=\"8\">\n          <div style=\"{{ p.style }}\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"{{ finaleWrapStyle }}\">\n        <div style=\"{{ finaleTextStyle }}\">Still building<span style=\"color:#e2231a;\">!<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"{{ trackOuterStyle }}\">\n        <div style=\"{{ trackStyle }}\">\n          <sc-for list=\"{{ eras }}\" as=\"era\" hint-placeholder-count=\"3\">\n            <div onmouseenter=\"{{ era.onEnter }}\" onmouseleave=\"{{ era.onLeave }}\" style=\"position:relative;width:100vw;height:100%;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:clamp(24px,4vw,56px);overflow:hidden;z-index:1;\">\n              <div style=\"position:relative;width:100%;max-width:1320px;display:flex;align-items:center;gap:clamp(24px,4vw,56px);flex-direction:{{ era.direction }};\">\n                <div style=\"flex:0 1 380px;min-width:0;\">\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:#e2231a;text-transform:uppercase;margin-bottom:10px;{{ era.tagLineStyle }}\">{{ era.range }}<\u002Fdiv>\n                  <div style=\"font-family:'Inter',sans-serif;font-weight:800;font-size:clamp(24px,3vw,38px);letter-spacing:-1px;margin-bottom:14px;{{ era.titleStyle }}\">{{ era.title }}<\u002Fdiv>\n                  <div style=\"font-family:'Inter',sans-serif;font-size:clamp(15px,1.4vw,17px);font-weight:500;line-height:1.6;max-width:420px;{{ era.bodyStyle }}\">{{ era.body }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;{{ era.tagsStyle }}\">\n                    <sc-for list=\"{{ era.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n                      <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1px;color:#0a0a0a;text-transform:uppercase;padding:6px 12px;border:1px solid #0a0a0a;\">{{ tag }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"flex:1 1 620px;min-width:0;{{ era.imgWrapStyle }}\">\n                  <div style=\"{{ era.cardStyle }}\">\n                    <image-slot id=\"{{ era.imgId }}\" src=\"{{ era.imgSrc }}\" style=\"{{ era.imgStyle }}\" shape=\"rect\" placeholder=\"{{ era.imgPlaceholder }}\"><\u002Fimage-slot>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:clamp(24px,4vh,40px) clamp(20px,4vw,56px);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#8a8a8a;text-transform:uppercase;\">\n    <span>B.S. Mechanical Engineering — 6 Years Experience<\u002Fspan>\n    <span>Ryan Krueger © 2026<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1400}}\">\nclass Component extends DCLogic {\n  state = { progress: [], fillPct: 0, hoveredIdx: null };\n  eraRefs = [];\n  timelineEl = null;\n  wavePathEl = null;\n  wavePathLen = 0;\n  ticking = false;\n\n  eraData = [\n    {\n      key: \"ms-lightsabers\",\n      range: \"Middle School\",\n      title: \"Building Lightsabers\",\n      body: \"Building lightsabers from scratch, hilt to blade \\u2014 my first taste of figuring things out by hand.\",\n      tags: [\"Hand tools\", \"Trial & error\", \"First builds\"],\n      imgId: \"timeline-ms-lightsabers\",\n      imgPlaceholder: \"Drop a lightsaber build photo\",\n      imgSrc: \"uploads/pasted-1783272645641-0.png\",\n      imgAspect: 573 / 679\n    },\n    {\n      key: \"ms-computers\",\n      range: \"Middle School\",\n      title: \"Desktop Computers\",\n      body: \"Building and upgrading desktop PCs \\u2014 my first lesson in making a pile of parts work as one machine.\",\n      tags: [\"PC building\", \"Hardware\", \"Troubleshooting\"],\n      imgId: \"timeline-ms-computers\",\n      imgPlaceholder: \"Drop a PC build photo\",\n      imgSrc: \"uploads/pasted-1783269107412-0.png\",\n      imgAspect: 3264 / 2448\n    },\n    {\n      key: \"ms-rc\",\n      range: \"Middle School\",\n      title: \"RC Cars & Planes\",\n      body: \"More crashing and repairing than actually flying \\u2014 which taught me more than any kit instructions.\",\n      tags: [\"RC cars\", \"RC planes\", \"Repair & rebuild\"],\n      imgId: \"timeline-ms-rc\",\n      imgPlaceholder: \"Drop an RC car/plane photo\",\n      imgSrc: \"uploads/pasted-1783269020878-0.png\",\n      imgAspect: 800 / 560\n    },\n    {\n      key: \"hs-scouts\",\n      range: \"Boy Scouts\",\n      title: \"Boy Scouts\",\n      body: \"Camping, service projects, and years of rank advancement \\u2014 capped off by earning Eagle Scout.\",\n      tags: [\"Eagle Scout\", \"Leadership\", \"Service projects\"],\n      imgId: \"timeline-scouts\",\n      imgPlaceholder: \"Drop a Boy Scouts photo\",\n      imgSrc: \"uploads/pasted-1783268497670-0.png\",\n      imgAspect: 1141 / 759\n    },\n    {\n      key: \"hs-eagle-project\",\n      range: \"Boy Scouts\",\n      title: \"Eagle Scout Project\",\n      body: \"Led a crew rebuilding the stairs and access at a historic train station museum \\u2014 planning, fundraising, and getting a whole troop to actually show up and build.\",\n      tags: [\"Eagle project\", \"Leadership\", \"Community service\"],\n      imgId: \"timeline-eagle-project\",\n      imgPlaceholder: \"Drop an Eagle project photo\",\n      imgSrc: \"uploads/pasted-1783272620288-0.png\",\n      imgAspect: 576 / 747\n    },\n    {\n      key: \"hs-philmont\",\n      range: \"Boy Scouts \\u2014 High Adventure\",\n      title: \"Philmont Trek\",\n      body: \"Carrying everything I needed on my back across the New Mexico backcountry \\u2014 a crash course in endurance.\",\n      tags: [\"Backpacking\", \"Endurance\", \"Crew leadership\"],\n      imgId: \"timeline-philmont\",\n      imgPlaceholder: \"Drop a Philmont trek photo\",\n      imgSrc: \"uploads/pasted-1783268269512-0.png\",\n      imgAspect: 1258 / 769\n    },\n    {\n      key: \"hs-seabase\",\n      range: \"Boy Scouts \\u2014 High Adventure\",\n      title: \"Sea Base\",\n      body: \"Mountains swapped for open water \\u2014 sailing and scuba diving that taught me to trust the gear.\",\n      tags: [\"Sailing\", \"Scuba diving\", \"Open water\"],\n      imgId: \"timeline-seabase\",\n      imgPlaceholder: \"Drop a Sea Base photo\",\n      imgSrc: \"uploads/pasted-1783268362218-0.png\",\n      imgAspect: 1104 / 789\n    },\n    {\n      key: \"hs-cyber\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"Cyber Security Team\",\n      body: \"My first taste of technical problem-solving as part of a team, thinking through systems from the inside out.\",\n      tags: [\"Cyber Security team\", \"Teamwork\", \"Problem solving\"],\n      imgId: \"timeline-hs-cyber\",\n      imgPlaceholder: \"Drop a cyber team photo\",\n      imgSrc: \"uploads/pasted-1783268830892-0.png\",\n      imgAspect: 960 / 560,\n      imgExtraFilter: \"blur(0.7px) sepia(0.55) contrast(0.88) brightness(1.02) saturate(0.9)\"\n    },\n    {\n      key: \"hs-3dprint\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"Getting Into 3D Printing\",\n      body: \"Turning ideas into physical parts overnight \\u2014 3D printing, then CNC and laser cutting, my first real design-to-object workflow.\",\n      tags: [\"3D printing\", \"CNC\", \"Laser cutting\", \"Rapid prototyping\"],\n      imgId: \"timeline-hs-3dprint\",\n      imgPlaceholder: \"Drop a 3D print photo\",\n      imgSrc: \"uploads/pasted-1783269221478-0.png\",\n      imgAspect: 640 / 853\n    },\n    {\n      key: \"hs-turo\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"Starting a Turo Business\",\n      body: \"Treating a hobby like a real operation \\u2014 managing vehicles, customers, and margins.\",\n      tags: [\"Turo business\", \"Operations\", \"Customer service\"],\n      imgId: \"timeline-hs-turo\",\n      imgPlaceholder: \"Drop a Turo fleet photo\",\n      imgSrc: \"uploads/pasted-1783269143840-0.png\",\n      imgAspect: 2468 / 1292,\n      imgExtraFilter: \"none\"\n    },\n    {\n      key: \"hs-ski\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"Ski Team\",\n      body: \"Racing on the ski team \\u2014 a season of early mornings, competition, and pushing through the cold.\",\n      tags: [\"Ski racing\", \"Team sport\", \"Competition\"],\n      imgId: \"timeline-hs-ski\",\n      imgPlaceholder: \"Drop a ski team photo\",\n      imgSrc: \"uploads/pasted-1783268526611-0.png\",\n      imgAspect: 1096 / 775\n    },\n    {\n      key: \"hs-firstclasses\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"First Engineering Classes\",\n      body: \"Connected everything I'd been doing by hand to real principles \\u2014 and pointed me at mechanical engineering.\",\n      tags: [\"First engineering classes\", \"Foundations\", \"Direction\"],\n      imgId: \"timeline-hs-classes\",\n      imgPlaceholder: \"Drop a classroom/project photo\",\n      imgSrc: \"uploads/pasted-1783268394885-0.png\",\n      imgAspect: 1348 / 789\n    },\n    {\n      key: \"hs-derby\",\n      range: \"High School \\u2014 Loyola Blakefield\",\n      title: \"Building a Demolition Derby Car\",\n      body: \"Stripping down and building out a demo derby car with my dad \\u2014 welding, wrenching, and getting genuinely hands-on with a car.\",\n      tags: [\"Fabrication\", \"Welding\", \"Family project\"],\n      imgId: \"timeline-hs-derby\",\n      imgPlaceholder: \"Drop a derby car photo\",\n      imgSrc: \"uploads/pasted-1783268919455-0.png\",\n      imgAspect: 1260 / 784\n    },\n    {\n      key: \"college-arduino\",\n      range: \"College \\u2014 York College of PA\",\n      title: \"Designing Arduino Boards\",\n      body: \"Hands-on from day one \\u2014 designing and programming Arduino boards turned theory into circuits I built myself.\",\n      tags: [\"Arduino\", \"Circuit design\", \"Mechatronics\"],\n      imgId: \"timeline-college-arduino\",\n      imgPlaceholder: \"Drop an Arduino project photo\",\n      imgSrc: \"uploads/pasted-1783269376460-0.png\",\n      imgAspect: 379 / 288\n    },\n    {\n      key: \"college-machining\",\n      range: \"College \\u2014 York College of PA\",\n      title: \"Mills, Lathes & CNC\",\n      body: \"Mills, lathes, and CNC machines \\u2014 turning drawings into precision parts on the shop floor.\",\n      tags: [\"Manual mills & lathes\", \"CNC machining\", \"Precision fabrication\"],\n      imgId: \"timeline-college-machining\",\n      imgPlaceholder: \"Drop a machine shop photo\"\n    }\n  ];\n\n  finaleExtraUnits = 1.1; // extra scroll room (in \"slide units\") reserved after the last slide for the finale\n\n  componentDidMount() {\n    const n = this.eraData.length;\n    const slidesFrac = (n - 1) / (n - 1 + this.finaleExtraUnits);\n\n    this.update = () => {\n      this.ticking = false;\n      const vh = window.innerHeight;\n\n      let scrollFrac = 0;\n      if (this.timelineEl) {\n        const rect = this.timelineEl.getBoundingClientRect();\n        const total = rect.height - vh;\n        const traveled = -rect.top;\n        scrollFrac = total > 0 ? Math.max(0, Math.min(1, traveled / total)) : 0;\n      }\n\n      // continuous position along the track, in \"slide units\" — pinned at the last\n      // slide once the finale buffer begins, so the explosion happens AFTER it\n      const cont = scrollFrac <= slidesFrac\n        ? (scrollFrac / slidesFrac) * (n - 1)\n        : (n - 1);\n\n      const finaleT = scrollFrac <= slidesFrac ? 0 : (scrollFrac - slidesFrac) / (1 - slidesFrac);\n      const progress = this.eraData.map((_, i) => Math.max(-1, Math.min(1, i - cont)));\n\n      // the line/dot only ever track the slide portion of the scroll (frozen once the\n      // finale buffer begins, matching the frozen track position) so they stay in sync\n      const lineFrac = Math.min(scrollFrac, slidesFrac) / slidesFrac;\n\n      // derive the dot's position from the SAME real arc-length used to draw the line\n      // (stroke-dashoffset), so the dot always sits exactly on the drawn tip\n      let waveDotY = 50;\n      if (this.wavePathEl) {\n        if (!this.wavePathLen) this.wavePathLen = this.wavePathEl.getTotalLength();\n        const pt = this.wavePathEl.getPointAtLength(lineFrac * this.wavePathLen);\n        waveDotY = pt.y;\n      }\n\n      this.setState({ progress, fillPct: scrollFrac * 100, cont, waveDotY, finaleT, lineFrac });\n    };\n\n    this.onScroll = () => {\n      if (this.ticking) return;\n      this.ticking = true;\n      requestAnimationFrame(this.update);\n    };\n\n    // capture:true so this also catches scroll events firing on an inner\n    // scroll container (e.g. the host's preview/scale wrapper), not just window\n    window.addEventListener(\"scroll\", this.onScroll, { passive: true, capture: true });\n    window.addEventListener(\"resize\", this.onScroll);\n    this.onScroll();\n    this.update();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"scroll\", this.onScroll, { capture: true });\n    window.removeEventListener(\"resize\", this.onScroll);\n  }\n\n  renderVals() {\n    const quote = \"\\u201cScience is about knowing; engineering is about doing.\\u201d\";\n    const words = quote.split(\" \");\n    const quoteWords = words.map((text, i) => ({ text, delay: (0.1 + i * 0.08).toFixed(2) }));\n\n    const progressArr = this.state.progress;\n\n    const eras = this.eraData.map((e, i) => {\n      const isHovered = this.state.hoveredIdx === i;\n      const p = progressArr[i] || 0; // -1 (below/future) .. 0 (centered) .. 1 (above/past)\n      const ap = Math.min(1, Math.abs(p));\n      const centered = 1 - ap; // 1 at center, 0 at edges\n      const fromLeft = i % 2 === 0;\n      const sideSign = fromLeft ? -1 : 1;\n\n      // plateau: stay fully in place/visible through the middle 70% of the section, only animate near the edges\n      const fadeStart = 0.35;\n      const eased = ap <= fadeStart ? 0 : Math.min(1, (ap - fadeStart) / (1 - fadeStart));\n\n      const textX = eased * 70 * sideSign * -1 * Math.sign(p || 1);\n      const imgX = eased * 50 * sideSign * Math.sign(p || 1);\n      const opacity = Math.max(0, 1 - eased).toFixed(3);\n      const scale = (0.94 + (1 - eased) * 0.06).toFixed(3);\n      const titleY = (eased * 20 * Math.sign(p || 1)).toFixed(2);\n      const bodyY = (eased * 12 * Math.sign(p || 1)).toFixed(2);\n\n      return {\n        key: e.key,\n        num: `0${i + 1}`,\n        range: e.range,\n        title: e.title,\n        body: e.body,\n        tags: e.tags,\n        imgId: e.imgId,\n        imgPlaceholder: e.imgPlaceholder,\n        direction: \"row\",\n        bigNumStyle: `position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) translateY(${(p * -40).toFixed(1)}px);font-family:'Inter',sans-serif;font-weight:900;font-size:min(38vw,520px);color:#0a0a0a;opacity:${(0.025 + centered * 0.03).toFixed(3)};line-height:1;pointer-events:none;user-select:none;z-index:0;`,\n        tagLineStyle: `opacity:${opacity};transform:translateX(${textX.toFixed(1)}px);transition:opacity 0.1s linear,transform 0.1s linear;`,\n        titleStyle: `opacity:${opacity};transform:translateX(${textX.toFixed(1)}px) translateY(${titleY}px);transition:opacity 0.1s linear,transform 0.1s linear;`,\n        bodyStyle: `opacity:${opacity};color:${isHovered ? '#0a0a0a' : '#4a4a4a'};transform:translateX(${textX.toFixed(1)}px) translateY(${bodyY}px);transition:opacity 0.1s linear,transform 0.1s linear,color 0.2s ease;`,\n        tagsStyle: `opacity:${opacity};transform:translateX(${textX.toFixed(1)}px);transition:opacity 0.1s linear,transform 0.1s linear;`,\n        imgWrapStyle: `opacity:${opacity};transform:translateX(${imgX.toFixed(1)}px) scale(${scale}) rotate(${(p * sideSign * 2).toFixed(2)}deg);transition:opacity 0.1s linear,transform 0.1s linear;`,\n        tilt: (i % 2 === 0 ? -1 : 1) * (1.5 + (i % 3)),\n        cardStyle: (() => {\n          const imgW = 248;\n          const aspect = e.imgAspect || (248 / 167);\n          const imgH = Math.round(imgW / aspect);\n          const cardW = imgW + 28;\n          const cardH = imgH + 14 + 46;\n          return `background:#fbfaf7;padding:14px 14px 46px;box-shadow:0 18px 40px rgba(10,10,10,0.18),0 2px 6px rgba(10,10,10,0.08);transform:rotate(${(i % 2 === 0 ? -1 : 1) * (1.5 + (i % 3))}deg);width:${cardW}px;height:${cardH}px;`;\n        })(),\n        imgStyle: (() => {\n          const imgW = 248;\n          const aspect = e.imgAspect || (248 / 167);\n          const imgH = Math.round(imgW / aspect);\n          const filter = isHovered ? \"none\" : (e.imgExtraFilter || \"sepia(0.35) saturate(1.15) contrast(0.94) brightness(1.04)\");\n          return `width:${imgW}px;height:${imgH}px;display:block;filter:${filter};transition:filter 0.25s ease;`;\n        })(),\n        imgSrc: e.imgSrc || \"\",\n        onEnter: () => this.setState({ hoveredIdx: i }),\n        onLeave: () => this.setState({ hoveredIdx: null })\n      };\n    });\n\n    const n = this.eraData.length;\n    const cont = this.state.cont || 0;\n    const trackOuterStyle = `position:relative;width:${n * 100}vw;height:100%;transform:translateX(-${(cont * 100).toFixed(3)}vw);`;\n    const trackStyle = `display:flex;height:100%;position:relative;z-index:1;`;\n    const headerFillStyle = `height:100%;background:#e2231a;width:${this.state.fillPct.toFixed(2)}%;`;\n    const wrapperHeight = `${(n + this.finaleExtraUnits) * 100}vh`;\n\n    const waveViewBox = `0 0 ${n * 100} 100`;\n    const wavePts = this.eraData.map((_, i) => ({ x: i * 100 + 50, y: i % 2 === 0 ? 34 : 66 }));\n    let wavePath = `M ${wavePts[0].x} ${wavePts[0].y}`;\n    for (let i = 1; i < wavePts.length; i++) {\n      const p0 = wavePts[i - 1], p1 = wavePts[i];\n      wavePath += ` C ${p0.x + 50} ${p0.y}, ${p1.x - 50} ${p1.y}, ${p1.x} ${p1.y}`;\n    }\n    // kept in lockstep with the slide track so the dot (pinned to screen-center) always\n    // sits exactly on the line's current point\n    const waveSpeed = 1;\n    const lineFadeOpacity = Math.max(0, 1 - (this.state.finaleT || 0) * 3.5).toFixed(3);\n    const waveWrapStyle = `position:absolute;top:0;left:0;width:${n * 100}vw;height:100%;pointer-events:none;z-index:0;opacity:${lineFadeOpacity};transition:opacity 0.15s linear;transform:translateX(-${(cont * 100 * waveSpeed).toFixed(3)}vw);`;\n\n    // reveal the wave progressively as the user scrolls (hidden at the very start),\n    // using the same frozen-after-last-slide fraction as the dot\n    const scrollFrac = this.state.lineFrac != null ? this.state.lineFrac : (n > 1 ? cont / (n - 1) : 0);\n    const waveDashStyle = `stroke-dasharray:100;stroke-dashoffset:${(100 * (1 - scrollFrac)).toFixed(2)};transition:stroke-dashoffset 0.05s linear;`;\n\n    // pinned to the horizontal center of the viewport (so it moves 1:1 with scroll, same\n    // as the centered slide) — its vertical position comes from getPointAtLength() at the\n    // same real arc-length used to draw the line, so it always sits on the drawn tip\n    const waveDotY = this.state.waveDotY != null ? this.state.waveDotY : (wavePts[0] ? wavePts[0].y : 50);\n    const waveDotVisible = scrollFrac > 0.001;\n    const waveDotWrapStyle = `position:absolute;left:50%;top:${waveDotY.toFixed(2)}%;transform:translate(-50%,-50%);opacity:${waveDotVisible ? 1 : 0};z-index:0;transition:opacity 0.2s ease,top 0.05s linear;`;\n    // finale: once the user has scrolled past the last slide, the dot explodes into\n    // particles and a bold closing line fades in\n    const finaleT = this.state.finaleT || 0;\n    const endProgress = Math.max(0, Math.min(1, finaleT / 0.6));\n    const dotCoreScale = (1 + endProgress * 2.4).toFixed(2);\n    const dotCoreOpacity = Math.max(0, 1 - endProgress * 1.4).toFixed(3);\n    const waveDotStyle = `width:12px;height:12px;border-radius:50%;background:#e2231a;box-shadow:0 0 0 4px #ffffff, 0 0 0 5px #e2231a55;transform:scale(${dotCoreScale});opacity:${dotCoreOpacity};transition:transform 0.05s linear,opacity 0.05s linear;`;\n    const setWavePathRef = (el) => { this.wavePathEl = el; };\n\n    const particles = Array.from({ length: 8 }).map((_, i) => {\n      const angle = (i / 8) * Math.PI * 2;\n      const dist = endProgress * 90;\n      const px = Math.cos(angle) * dist;\n      const py = Math.sin(angle) * dist;\n      const op = endProgress <= 0 ? 0 : Math.max(0, 1 - endProgress * 1.1);\n      return {\n        key: `p${i}`,\n        style: `position:absolute;left:0;top:0;width:7px;height:7px;border-radius:50%;background:#e2231a;transform:translate(${px.toFixed(1)}px,${py.toFixed(1)}px);opacity:${op.toFixed(3)};transition:transform 0.05s linear,opacity 0.05s linear;`\n      };\n    });\n\n    const finaleProgress = Math.max(0, Math.min(1, (finaleT - 0.4) / 0.6));\n    const finaleWrapStyle = `position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:4;padding:clamp(24px,4vw,56px);text-align:center;`;\n    // pop: overshoot past 1x scale on the way in, then settle — gives it punch instead of a plain fade\n    const popScale = finaleProgress <= 0 ? 0.7 : 1 + Math.sin(Math.min(1, finaleProgress) * Math.PI) * 0.22;\n    const finaleTextStyle = `font-family:'Inter',sans-serif;font-weight:900;font-size:clamp(36px,7vw,92px);letter-spacing:-1.5px;line-height:1.15;color:#0a0a0a;opacity:${finaleProgress.toFixed(3)};transform:translateY(${(28 * (1 - finaleProgress)).toFixed(1)}px) scale(${popScale.toFixed(3)});transition:opacity 0.05s linear,transform 0.05s linear;max-width:1100px;`;\n\n    const dots = this.eraData.map((e, i) => {\n      const active = Math.abs(i - cont) < 0.5;\n      return {\n        key: e.key,\n        style: `width:${active ? 22 : 7}px;height:7px;border-radius:4px;background:${active ? '#e2231a' : '#cfcfcf'};transition:all 0.25s ease;`\n      };\n    });\n\n    const setTimelineRef = (el) => { this.timelineEl = el; };\n\n    return { quoteWords, eras, trackOuterStyle, trackStyle, headerFillStyle, wrapperHeight, dots, waveViewBox, wavePath, waveWrapStyle, waveDashStyle, waveDotWrapStyle, waveDotStyle, particles, finaleWrapStyle, finaleTextStyle, setWavePathRef, setTimelineRef };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
